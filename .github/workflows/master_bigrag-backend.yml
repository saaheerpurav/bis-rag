name: Build and deploy Python app to Azure Web App - bigrag-backend

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Zip app (exclude frontend, docs, tests)
        run: |
          zip -r app.zip . \
            --exclude "*.git*" \
            --exclude "frontend/*" \
            --exclude "mobile/*" \
            --exclude "docs/*" \
            --exclude "__pycache__/*" \
            --exclude "*.pyc" \
            --exclude ".env"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1B6454612B844CF5B18D068107911FE8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_4CBEB69EA0CD40BA81E583E1CA13497A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_664710F64E304786B109317B54396C07 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'bigrag-backend'
          slot-name: 'Production'
          package: app.zip
